services:
  - type: web
    name: fed-chair-simulator
    runtime: python
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -m gunicorn main:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
